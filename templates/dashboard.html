<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#ffffff;
    text-align:center;
}

/* HEADER */
h2 {
    margin:20px;
}

/* CONTROLS */
.controls {
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

button {
    padding:10px;
    border-radius:10px;
    border:none;
    background:#00c6ff;
    color:white;
    cursor:pointer;
}

select {
    padding:10px;
    border-radius:10px;
}

/* STATS */
.stats {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    width:200px;
}

.card p {
    font-size:20px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.chart-box {
    background: rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
}
</style>
</head>

<body>

<h2>📊 Maharashtra Dashboard</h2>

<div class="controls">
    <select id="crop">
        <option value="All">All Crops</option>
    </select>

    <button onclick="setMode('district')">District</button>
    <button onclick="setMode('mandi')">Mandi</button>

    <!-- 🔥 UNIT TOGGLE -->
    <button onclick="toggleUnit()">Switch to Kg</button>
</div>

<div class="stats">
    <div class="card">
        <h3>Top Crop</h3>
        <p id="topCrop">-</p>
    </div>

    <div class="card">
        <h3>Max Price</h3>
        <p id="maxPrice">-</p>
    </div>

    <div class="card">
        <h3>Average</h3>
        <p id="avgPrice">-</p>
    </div>
</div>

<div class="grid">
    <div class="chart-box">
        <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="lineChart"></canvas>
    </div>
</div>

<script>
let rawData = [];
let mode = "district";
let unit = "quintal";   // 🔥 NEW
let barChart, pieChart, lineChart;

async function loadData(){
    const res = await fetch("/dashboard-data");
    rawData = await res.json();
    populateCrops();
    process();
}

function populateCrops(){
    let set = new Set(rawData.map(i=>i.crop));
    let select = document.getElementById("crop");

    set.forEach(c=>{
        let opt=document.createElement("option");
        opt.value=c;
        opt.text=c;
        select.appendChild(opt);
    });

    select.onchange = process;
}

function setMode(m){
    mode = m;
    process();
}

/* 🔥 UNIT TOGGLE FUNCTION */
function toggleUnit(){
    if(unit === "quintal"){
        unit = "kg";
        event.target.innerText = "Switch to Quintal";
    }else{
        unit = "quintal";
        event.target.innerText = "Switch to Kg";
    }
    process();
}

function convert(price){
    return unit === "kg" ? (price/100) : price;
}

function process(){

    let crop = document.getElementById("crop").value;

    let filtered = rawData.filter(i => crop==="All" || i.crop===crop);

    let map = {};
    let total = 0;

    filtered.forEach(i=>{
        let key = (mode==="district") ? i.district : i.market;

        let price = convert(i.price);

        if(!map[key]) map[key]=[];
        map[key].push(price);

        total += price;
    });

    let result = Object.entries(map)
        .map(([k,v]) => [k, v.reduce((a,b)=>a+b,0)/v.length])
        .sort((a,b)=>b[1]-a[1])
        .slice(0,10);

    let labels = result.map(i=>i[0]);
    let prices = result.map(i=>i[1]);

    let unitText = (unit === "kg") ? "/kg" : "/Quintal";

    if(filtered.length>0){
        document.getElementById("topCrop").innerText = filtered[0].crop;
        document.getElementById("maxPrice").innerText = 
            "₹"+Math.max(...filtered.map(i=>convert(i.price))) + " " + unitText;

        document.getElementById("avgPrice").innerText = 
            "₹"+Math.floor(total/filtered.length) + " " + unitText;
    }

    drawCharts(labels,prices,unitText);
}

function drawCharts(labels,prices,unitText){

    if(barChart) barChart.destroy();
    if(pieChart) pieChart.destroy();
    if(lineChart) lineChart.destroy();

    barChart = new Chart(document.getElementById("barChart"),{
        type:"bar",
        data:{ labels:labels, datasets:[{ label:"Price "+unitText, data:prices, backgroundColor:'#00c6ff' }] },
        options:{
            plugins:{ legend:{ labels:{ color:'white' } } },
            scales:{ x:{ ticks:{ color:'white' } }, y:{ ticks:{ color:'white' } } }
        }
    });

    pieChart = new Chart(document.getElementById("pieChart"),{
        type:"pie",
        data:{ labels:labels, datasets:[{ data:prices }] },
        options:{ plugins:{ legend:{ labels:{ color:'white' } } } }
    });

    lineChart = new Chart(document.getElementById("lineChart"),{
        type:"line",
        data:{ labels:labels, datasets:[{ label:"Price "+unitText, data:prices, borderColor:'#00c6ff' }] },
        options:{
            plugins:{ legend:{ labels:{ color:'white' } } },
            scales:{ x:{ ticks:{ color:'white' } }, y:{ ticks:{ color:'white' } } }
        }
    });
}

loadData();
</script>

</body>
</html>
