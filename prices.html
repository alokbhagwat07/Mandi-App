<!DOCTYPE html>
<html>
<head>
    <title>Live Mandi Prices</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #2c3e50;
            color: white;
        }
    </style>
</head>

<body>

<h1>🌾 Live Mandi Prices</h1>

<!-- Filters -->
<input type="text" id="crop" placeholder="Enter Vegetable (e.g. Tomato)">
<input type="text" id="state" placeholder="Enter State (e.g. Maharashtra)">
<input type="text" id="district" placeholder="Enter District (e.g. Pune)">

<button onclick="loadData()">Search</button>

<!-- Table -->
<table>
    <thead>
        <tr>
            <th>Crop</th>
            <th>State</th>
            <th>District</th> <!-- ✅ Added -->
            <th>Market</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script>
function loadData() {
    let crop = document.getElementById("crop").value;
    let state = document.getElementById("state").value;
    let district = document.getElementById("district").value;

    let url = `/prices?`;

    if (crop) url += `crop=${crop}&`;
    if (state) url += `state=${state}&`;
    if (district) url += `district=${district}`;

    fetch(url)
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("table-body");
        table.innerHTML = "";

        data.forEach(item => {
            let row = `
                <tr>
                    <td>${item.crop}</td>
                    <td>${item.state}</td>
                    <td>${item.district}</td> <!-- ✅ Added -->
                    <td>${item.market}</td>
                    <td>${item.price} / Quintal</td>
                </tr>
            `;
            table.innerHTML += row;
        });
    });
}

//  AUTO REFRESH EVERY 5 SECONDS
setInterval(loadData,500000);

// Load first time
loadData();
</script>

</body>
</html>
